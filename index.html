<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>한글이랑 · تعلّم الكورية من الصفر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2130;
    --ink-2:#262E42;
    --ink-3:#323B54;
    --paper:#FBF6EC;
    --paper-2:#F2E9D3;
    --paper-3:#EAE0C4;
    --indigo:#2A5E8C;
    --indigo-deep:#1D4266;
    --indigo-soft:#DCE7EF;
    --dancheong:#B23B34;
    --dancheong-soft:#F3DEDA;
    --gold:#BD8A2E;
    --gold-soft:#F3E6C8;
    --celadon:#5E9683;
    --celadon-soft:#DCEAE3;
    --text:#2A2620;
    --text-dim:#6B6354;
    --text-on-ink:#F2ECDC;
    --text-on-ink-dim:#AFAA9C;
    --line:#E3D6B8;
    --line-ink:#3A415A;
    --radius-s:8px;
    --radius:14px;
    --radius-l:22px;
    --shadow:0 10px 30px -12px rgba(27,33,48,.25);
    --font-ar:'Cairo',sans-serif;
    --font-kr:'Noto Sans KR',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:var(--font-ar);
    background:var(--paper);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{margin:0;font-family:var(--font-ar);}
  p{margin:0;}
  button{font-family:var(--font-ar);}

  .kr{
    font-family:var(--font-kr);
    direction:ltr;
    unicode-bidi:isolate;
  }
  .rom{
    font-family:var(--font-mono);
    direction:ltr;
    unicode-bidi:isolate;
    color:var(--text-dim);
    font-style:italic;
    letter-spacing:.02em;
  }

  ::selection{background:var(--gold-soft);}

  a{color:inherit;}

  /* ===== Header / Nav ===== */
  header.site{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--ink);
    color:var(--text-on-ink);
    box-shadow:0 4px 18px -8px rgba(0,0,0,.35);
  }
  .brand-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 18px 6px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:38px;height:38px;
    border-radius:10px;
    background:linear-gradient(155deg,var(--indigo),var(--indigo-deep));
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-kr);
    font-weight:700;
    font-size:19px;
    color:var(--text-on-ink);
    flex:none;
  }
  .brand-text h1{
    font-size:16px;
    font-weight:800;
    letter-spacing:.01em;
  }
  .brand-text span{
    display:block;
    font-size:11px;
    color:var(--text-on-ink-dim);
    margin-top:1px;
  }
  .xp-pill{
    display:flex;align-items:center;gap:6px;
    background:var(--ink-2);
    border:1px solid var(--line-ink);
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
    color:var(--gold-soft);
    white-space:nowrap;
  }
  .xp-pill b{font-family:var(--font-mono);font-weight:500;}

  nav.tabs{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding:10px 14px 12px;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  .tab-btn{
    flex:none;
    display:flex;
    align-items:center;
    gap:7px;
    background:transparent;
    border:1px solid var(--line-ink);
    color:var(--text-on-ink-dim);
    padding:9px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:background .18s,color .18s,border-color .18s;
  }
  .tab-btn svg{width:16px;height:16px;flex:none;}
  .tab-btn:hover{color:var(--text-on-ink);border-color:var(--text-on-ink-dim);}
  .tab-btn.active{
    background:var(--paper);
    color:var(--ink);
    border-color:var(--paper);
  }

  main{max-width:940px;margin:0 auto;padding:0 16px 70px;}
  section.view{display:none;padding-top:26px;}
  section.view.active{display:block;animation:fadein .35s ease both;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:12px;font-weight:700;letter-spacing:.04em;
    color:var(--indigo-deep);
    background:var(--indigo-soft);
    padding:5px 12px;border-radius:999px;
    margin-bottom:12px;
  }
  h2.view-title{font-size:26px;font-weight:800;line-height:1.3;}
  p.view-lede{color:var(--text-dim);font-size:15px;margin-top:8px;line-height:1.9;max-width:60ch;}

  /* ===== Hero (home) ===== */
  .hero{
    background:var(--ink);
    color:var(--text-on-ink);
    border-radius:var(--radius-l);
    padding:30px 22px 26px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute;inset:0;
    background:radial-gradient(120% 90% at 15% -10%, rgba(42,94,140,.35), transparent 60%),
               radial-gradient(90% 70% at 100% 110%, rgba(178,59,52,.22), transparent 55%);
    pointer-events:none;
  }
  .hero-inner{position:relative;z-index:1;}
  .hero .eyebrow{background:rgba(242,236,220,.1);color:var(--gold-soft);}
  .hero h1{
    font-size:28px;
    font-weight:800;
    line-height:1.35;
    margin-top:6px;
  }
  .hero p.sub{
    color:var(--text-on-ink-dim);
    margin-top:10px;
    font-size:14.5px;
    line-height:1.85;
    max-width:52ch;
  }

  .block-lab{
    margin:26px 0 6px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
  }
  .comp-tile{
    width:52px;height:52px;
    border-radius:12px;
    background:var(--ink-2);
    border:1px solid var(--line-ink);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-kr);
    font-size:24px;
    font-weight:700;
    color:var(--text-on-ink);
    opacity:0;
    transform:translateY(8px);
    animation:tileIn .5s ease forwards;
  }
  .comp-tile:nth-child(1){animation-delay:.15s;}
  .comp-tile:nth-child(2){animation-delay:.4s;}
  .comp-tile:nth-child(3){animation-delay:.65s;}
  .plus-sign{color:var(--text-on-ink-dim);font-size:18px;opacity:0;animation:tileIn .4s ease forwards;}
  .plus-sign.p1{animation-delay:.3s;}
  .plus-sign.p2{animation-delay:.55s;}
  .eq-sign{color:var(--gold-soft);font-size:20px;opacity:0;animation:tileIn .4s ease forwards;animation-delay:.9s;}
  .combo-tile{
    width:76px;height:76px;
    border-radius:16px;
    background:linear-gradient(155deg,var(--indigo),var(--indigo-deep));
    border:1px solid rgba(242,236,220,.25);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-kr);
    font-size:36px;
    font-weight:700;
    color:var(--text-on-ink);
    opacity:0;
    transform:scale(.7);
    animation:comboIn .55s cubic-bezier(.2,1.4,.4,1) forwards;
    animation-delay:1.05s;
    box-shadow:0 0 0 0 rgba(189,138,46,.5);
  }
  @keyframes tileIn{to{opacity:1;transform:translateY(0);}}
  @keyframes comboIn{
    to{opacity:1;transform:scale(1);box-shadow:0 0 0 10px rgba(189,138,46,0);}
  }
  .block-lab-caption{
    text-align:center;
    font-size:12.5px;
    color:var(--text-on-ink-dim);
    margin-top:6px;
    opacity:0;
    animation:tileIn .5s ease forwards;
    animation-delay:1.3s;
  }
  .block-lab-caption b{color:var(--text-on-ink);font-weight:700;}

  @media (prefers-reduced-motion:reduce){
    .comp-tile,.plus-sign,.eq-sign,.combo-tile,.block-lab-caption{animation:none;opacity:1;transform:none;}
    section.view.active{animation:none;}
  }

  .cta-row{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;position:relative;z-index:1;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 20px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform .15s, filter .15s;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--gold);color:var(--ink);}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent;border-color:var(--line-ink);color:var(--text-on-ink);}
  .btn-ghost:hover{border-color:var(--text-on-ink-dim);}
  .btn-outline{background:transparent;border-color:var(--line);color:var(--indigo-deep);}
  .btn-outline:hover{background:var(--indigo-soft);}
  .btn:focus-visible, .tab-btn:focus-visible, .quiz-opt:focus-visible, .listen-btn:focus-visible{
    outline:2px solid var(--gold);outline-offset:2px;
  }

  /* path */
  .path{margin-top:34px;}
  .path h3{font-size:14px;font-weight:700;color:var(--text-dim);margin-bottom:14px;}
  .path-steps{display:flex;flex-direction:column;gap:0;}
  .path-step{
    display:flex;gap:14px;padding:14px 4px;border-bottom:1px dashed var(--line);
    cursor:pointer;
  }
  .path-step:last-child{border-bottom:none;}
  .path-num{
    flex:none;width:30px;height:30px;border-radius:50%;
    background:var(--paper-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--text-dim);
  }
  .path-step.done .path-num{background:var(--celadon);border-color:var(--celadon);color:#fff;}
  .path-body h4{font-size:14.5px;font-weight:700;}
  .path-body p{font-size:12.5px;color:var(--text-dim);margin-top:2px;}

  /* ===== Cards / grids ===== */
  .subhead{
    font-size:13px;font-weight:700;color:var(--indigo-deep);
    margin:30px 0 4px;
    display:flex;align-items:center;gap:8px;
  }
  .subhead .count{
    font-family:var(--font-mono);font-weight:400;color:var(--text-dim);font-size:11.5px;
  }
  .note-box{
    background:var(--indigo-soft);
    border-radius:var(--radius);
    padding:14px 16px;
    font-size:13.5px;
    line-height:1.9;
    color:var(--indigo-deep);
    margin:14px 0 6px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
    margin-top:12px;
  }
  .char-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 10px 12px;
    text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .char-card .ch{font-family:var(--font-kr);font-size:32px;font-weight:700;line-height:1;color:var(--ink);}
  .char-card .rom{font-size:13px;margin-top:4px;}
  .char-card .sound{font-size:11.5px;color:var(--text-dim);line-height:1.6;margin-top:2px;min-height:32px;}
  .char-card .example{
    margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
    width:100%;font-size:11.5px;
  }
  .char-card .example .kr{font-size:13px;color:var(--ink);display:block;}
  .char-card .example .rom{display:block;font-size:11px;margin-top:1px;}
  .char-card .example .ar{display:block;color:var(--text-dim);margin-top:2px;}

  .listen-btn{
    margin-top:8px;
    width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);background:var(--paper);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--indigo);
    transition:background .15s;
  }
  .listen-btn:hover{background:var(--indigo-soft);}
  .listen-btn svg{width:14px;height:14px;}
  .listen-btn.small{width:26px;height:26px;}
  .listen-btn.small svg{width:12px;height:12px;}

  .cat-block{margin-top:8px;}
  .cat-title{
    font-size:15px;font-weight:800;color:var(--ink);
    margin:26px 0 2px;
    padding-bottom:8px;border-bottom:2px solid var(--paper-3);
  }

  .word-row{
    display:flex;align-items:center;gap:12px;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius-s);
    padding:10px 12px;margin-top:8px;
  }
  .word-row .txt{flex:1;min-width:0;}
  .word-row .kr{font-size:16px;font-weight:600;color:var(--ink);display:block;}
  .word-row .rom{font-size:12px;display:block;margin-top:1px;}
  .word-row .ar{font-size:13px;color:var(--text-dim);white-space:nowrap;flex:none;}

  .grammar-card{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-top:14px;
  }
  .grammar-card h4{font-size:15.5px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px;}
  .grammar-card h4 .tag{
    font-family:var(--font-mono);font-size:11px;font-weight:500;
    color:var(--dancheong);background:var(--dancheong-soft);
    padding:2px 8px;border-radius:999px;
  }
  .grammar-card p.exp{font-size:13.5px;line-height:1.9;color:var(--text-dim);margin-top:8px;}
  .example-box{
    margin-top:12px;background:var(--paper-2);border-radius:var(--radius-s);
    padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .example-box .txt .kr{font-size:16px;font-weight:600;color:var(--ink);display:block;}
  .example-box .txt .rom{font-size:12px;display:block;margin-top:2px;}
  .example-box .txt .ar{font-size:12.5px;color:var(--text-dim);margin-top:3px;display:block;}

  .phrase-cat{margin-top:26px;}
  .phrase-row{
    display:flex;align-items:center;gap:10px;
    padding:11px 4px;border-bottom:1px solid var(--line);
  }
  .phrase-row:last-child{border-bottom:none;}
  .phrase-row .txt{flex:1;min-width:0;}
  .phrase-row .kr{font-size:15.5px;font-weight:600;color:var(--ink);display:block;}
  .phrase-row .rom{font-size:12px;display:block;margin-top:2px;}
  .phrase-row .ar{font-size:13px;color:var(--text-dim);display:block;margin-top:3px;}

  /* ===== Quiz ===== */
  .quiz-picker{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px;}
  .quiz-mode-card{
    flex:1;min-width:200px;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;cursor:pointer;transition:border-color .15s,transform .15s;
  }
  .quiz-mode-card:hover{border-color:var(--indigo);transform:translateY(-2px);}
  .quiz-mode-card h4{font-size:15.5px;font-weight:800;color:var(--ink);}
  .quiz-mode-card p{font-size:12.5px;color:var(--text-dim);margin-top:6px;line-height:1.7;}
  .quiz-mode-card .best{
    margin-top:12px;font-family:var(--font-mono);font-size:12px;color:var(--gold);
    display:flex;align-items:center;gap:6px;
  }

  .quiz-run{background:#fff;border:1px solid var(--line);border-radius:var(--radius-l);padding:22px;margin-top:16px;}
  .quiz-progress{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--text-dim);margin-bottom:16px;}
  .quiz-progress b{color:var(--ink);font-family:var(--font-mono);}
  .progress-bar{height:6px;border-radius:99px;background:var(--paper-2);overflow:hidden;margin-bottom:22px;}
  .progress-bar > div{height:100%;background:var(--indigo);border-radius:99px;transition:width .3s;}

  .quiz-prompt{text-align:center;margin-bottom:22px;}
  .quiz-prompt .big{font-family:var(--font-kr);font-size:52px;font-weight:700;color:var(--ink);}
  .quiz-prompt .med{font-family:var(--font-kr);font-size:26px;font-weight:600;color:var(--ink);}
  .quiz-prompt .cap{font-size:12px;color:var(--text-dim);margin-top:6px;}

  .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .quiz-opt{
    padding:14px 10px;border-radius:var(--radius-s);border:1px solid var(--line);
    background:var(--paper);cursor:pointer;font-size:14px;font-weight:600;color:var(--ink);
    transition:background .15s,border-color .15s;
  }
  .quiz-opt{text-align:center;}
  .quiz-opt.kr-opt{font-family:var(--font-kr);}
  .quiz-opt.rom-opt{font-family:var(--font-mono);direction:ltr;unicode-bidi:isolate;}
  .quiz-opt:hover{border-color:var(--indigo);}
  .quiz-opt.correct{background:var(--celadon-soft);border-color:var(--celadon);color:#2C4A40;}
  .quiz-opt.wrong{background:var(--dancheong-soft);border-color:var(--dancheong);color:#7A2621;}
  .quiz-opt[disabled]{cursor:default;}

  .quiz-feedback{
    text-align:center;margin-top:16px;font-size:13px;font-weight:700;min-height:20px;
  }
  .quiz-feedback.ok{color:var(--celadon);}
  .quiz-feedback.no{color:var(--dancheong);}

  .quiz-next{display:flex;justify-content:center;margin-top:18px;}

  .quiz-result{text-align:center;padding:10px 0;}
  .quiz-result .score{font-family:var(--font-mono);font-size:44px;font-weight:700;color:var(--ink);margin-top:6px;}
  .quiz-result .score span{font-size:20px;color:var(--text-dim);}
  .quiz-result p{color:var(--text-dim);font-size:13.5px;margin-top:8px;}
  .quiz-result .xp-earned{
    display:inline-flex;align-items:center;gap:6px;margin-top:14px;
    background:var(--gold-soft);color:#7A5A15;padding:6px 14px;border-radius:999px;
    font-size:12.5px;font-weight:700;
  }
  .quiz-result .actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}

  /* ===== Progress dashboard ===== */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px;}
  .stat-card{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;text-align:center;
  }
  .stat-card .n{font-family:var(--font-mono);font-size:26px;font-weight:700;color:var(--indigo-deep);}
  .stat-card .l{font-size:11.5px;color:var(--text-dim);margin-top:4px;}

  .checklist{margin-top:24px;}
  .check-row{
    display:flex;align-items:center;gap:12px;
    padding:12px 4px;border-bottom:1px solid var(--line);
  }
  .check-row:last-child{border-bottom:none;}
  .check-mark{
    flex:none;width:26px;height:26px;border-radius:50%;
    border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;
  }
  .check-row.done .check-mark{background:var(--celadon);border-color:var(--celadon);}
  .check-mark svg{width:13px;height:13px;color:#fff;opacity:0;}
  .check-row.done .check-mark svg{opacity:1;}
  .check-row .lbl{font-size:14px;font-weight:600;flex:1;}
  .check-row .st{font-size:12px;color:var(--text-dim);}

  .reset-row{margin-top:30px;text-align:center;}
  .reset-link{
    background:none;border:none;color:var(--dancheong);font-size:12.5px;
    text-decoration:underline;cursor:pointer;font-family:var(--font-ar);
  }

  footer{
    text-align:center;padding:30px 16px 40px;color:var(--text-dim);font-size:11.5px;
  }

  @media (min-width:640px){
    .quiz-opts{grid-template-columns:1fr 1fr;}
    h2.view-title{font-size:30px;}
    .hero h1{font-size:34px;}
  }
</style>
</head>
<body>

<header class="site">
  <div class="brand-row">
    <div class="brand">
      <div class="brand-mark">한</div>
      <div class="brand-text">
        <h1>한글이랑</h1>
        <span>منصّتك لتعلّم الكورية بالعربية</span>
      </div>
    </div>
    <div class="xp-pill" id="xpPill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 2l2.9 6.26L21 9.27l-4.5 4.39L17.8 21 12 17.77 6.2 21l1.3-7.34L3 9.27l6.1-1.01L12 2z"/></svg>
      <span><b id="xpVal">0</b> نقطة</span>

/* ============ STATE & STORAGE ============ */
function defaultState(){
  return {
    visited:{home:true,hangul:false,vocab:false,grammar:false,phrases:false},
    quiz:{hangul:{best:0,attempts:0},vocab:{best:0,attempts:0}},
    xp:0
  };
}
let state = defaultState();
let quizState = null;
let currentView = 'home';

async function loadState(){
  try{
    const res = await window.storage.get('korean-progress', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      const d = defaultState();
      state = {
        visited: Object.assign(d.visited, parsed.visited||{}),
        quiz: {
          hangul: Object.assign(d.quiz.hangul, (parsed.quiz&&parsed.quiz.hangul)||{}),
          vocab: Object.assign(d.quiz.vocab, (parsed.quiz&&parsed.quiz.vocab)||{})
        },
        xp: typeof parsed.xp==='number' ? parsed.xp : 0
      };
    }
  }catch(e){ state = defaultState(); }
}
async function saveState(){
  try{ await window.storage.set('korean-progress', JSON.stringify(state), false); }
  catch(e){ console.error('تعذّر حفظ التقدّم', e); }
}

/* ============ UTIL ============ */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

let koVoice = null;
function pickKoVoice(){
  if(!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices();
  koVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('ko')) || null;
}
if(window.speechSynthesis){
  pickKoVoice();
  window.speechSynthesis.onvoiceschanged = pickKoVoice;
}
function speak(text){
  if(!text || !window.speechSynthesis) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    if(koVoice) u.voice = koVoice;
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }catch(e){ console.error('تعذّر النطق', e); }
}

function listenBtnHTML(text, size){
  const cls = size==='small' ? 'listen-btn small' : 'listen-btn';
  return `<button class="${cls}" data-speak="${text}" aria-label="استمع للنطق">

}

        <div class="best">أفضل نتيجة: <span id="bestVocab">${state.quiz.vocab.best}/10</span></div>
      </div>
    </div>
    <div id="quizArea"></div>
  `;
}
function flattenHangul(){
  return [...hangulData.vowels,...hangulData.consonants,...hangulData.doubleConsonants,...hangulData.compoundVowels];
}
function flattenVocab(){
  let all=[];
  vocabData.forEach(cat=>cat.items.forEach(it=>all.push(it)));
  return all;
}
function startQuiz(mode){
  const pool = mode==='hangul' ? flattenHangul() : flattenVocab();
  const chosen = shuffle(pool).slice(0, Math.min(10,pool.length));
  const questions = chosen.map(item=>{
    if(mode==='hangul'){
      const distractors = shuffle(pool.filter(x=>x.char!==item.char)).slice(0,3).map(x=>x.rom);
      return {kr:item.char, rom:null, correct:item.rom, options:shuffle([item.rom,...distractors])};
    }else{
      const distractors = shuffle(pool.filter(x=>x.ar!==item.ar)).slice(0,3).map(x=>x.ar);
      return {kr:item.kr, rom:item.rom, correct:item.ar, options:shuffle([item.ar,...distractors])};
    }
  });
  quizState = {mode, questions, index:0, score:0};
  renderQuizQuestion();
}
function renderQuizQuestion(){
  const area = document.getElementById('quizArea');
  const q = quizState.questions[quizState.index];
  const promptClass = quizState.mode==='hangul' ? 'big kr' : 'med kr';
  area.innerHTML = `
    <div class="quiz-run">
      <div class="quiz-progress">
        <span>سؤال <b>${quizState.index+1}</b> من <b>${quizState.questions.length}</b></span>
        <span>النقاط: <b>${quizState.score}</b></span>
      </div>
      <div class="progress-bar"><div style="width:${(quizState.index/quizState.questions.length)*100}%"></div></div>
      <div class="quiz-prompt">
        <div class="${promptClass}">${q.kr}</div>
        ${q.rom ? `<div class="cap rom">${q.rom}</div>` : `<div class="cap">ما نطق هذا الحرف؟</div>`}
      </div>
      <div class="quiz-opts">
        ${q.options.map((opt,i)=>{
          const cls = quizState.mode==='hangul' ? 'quiz-opt rom-opt' : 'quiz-opt';
          return `<button class="${cls}" data-idx="${i}">${opt}</button>`;
        }).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-next" id="quizNextWrap"></div>
    </div>
  `;
}
function answerQuiz(btn){
  if(btn.disabled) return;
  const q = quizState.questions[quizState.index];
  const idx = parseInt(btn.dataset.idx,10);
  const chosen = q.options[idx];
  const correct = chosen === q.correct;
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled = true;
    const bIdx = parseInt(b.dataset.idx,10);
    if(q.options[bIdx]===q.correct) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  const fb = document.getElementById('quizFeedback');
  if(correct){
    quizState.score++;
    fb.textContent = 'إجابة صحيحة!';
    fb.className = 'quiz-feedback ok';
  }else{
    fb.textContent = 'إجابة غير صحيحة — الصحيحة: ' + q.correct;
    fb.className = 'quiz-feedback no';
  }
  const isLast = quizState.index === quizState.questions.length-1;
  document.getElementById('quizNextWrap').innerHTML =
    `<button class="btn btn-primary" id="quizNextBtn">${isLast?'عرض النتيجة':'السؤال التالي'}</button>`;
}
function nextQuizQuestion(){
  quizState.index++;
  if(quizState.index >= quizState.questions.length) finishQuiz();
  else renderQuizQuestion();
}
function resultMessage(score,total){
  const pct = score/total;
  if(pct===1) return 'ممتاز! إجابات كاملة صحيحة';
  if(pct>=0.7) return 'أداء رائع، استمرّي!';
  if(pct>=0.4) return 'بداية جيدة، راجعي الدرس وحاولي مجدداً';
  return 'لا بأس، كرّري الدرس وجرّبي مرة أخرى';
}
async function finishQuiz(){
  const mode = quizState.mode, score = quizState.score, total = quizState.questions.length;
  const earnedXp = score*10;
  state.xp += earnedXp;
  state.quiz[mode].attempts++;
  if(score > state.quiz[mode].best) state.quiz[mode].best = score;
  await saveState();
  updateXpPill();
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-run">
      <div class="quiz-result">
        <div class="eyebrow">النتيجة</div>
        <div class="score">${score}<span>/${total}</span></div>
        <p>${resultMessage(score,total)}</p>
        <div class="xp-earned">+${earnedXp} نقطة خبرة</div>
        <div class="actions">
          <button class="btn btn-primary" id="quizRetryBtn">جولة أخرى</button>
          <button class="btn btn-outline" id="quizBackBtn">رجوع للقائمة</button>
        </div>
      </div>
    </div>
  `;
  refreshQuizBestLabels();
  refreshProgressView();
  refreshHomeSnippet();
}
function refreshQuizBestLabels(){
  const bh = document.getElementById('bestHangul');
  const bv = document.getElementById('bestVocab');
  if(bh) bh.textContent = state.quiz.hangul.best+'/10';
  if(bv) bv.textContent = state.quiz.vocab.best+'/10';
}

function renderProgressHTML(){
  return `
    <span class="eyebrow">تقدّمك</span>
    <h2 class="view-title">لوحة التقدّم</h2>
    <p class="view-lede">تابعي ما أنجزتِه ونتائج اختباراتك في مكان واحد.</p>
    <div class="stat-grid">

      <div class="stat-card"><div class="n" id="statHangulBest">${state.quiz.hangul.best}/10</div><div class="l">أفضل نتيجة – الأبجدية</div></div>

    </div>
    <div class="checklist" id="checklistWrap">${checklistHTML()}</div>
    <div class="reset-row"><button class="reset-link" id="resetProgressBtn">إعادة تعيين كل التقدّم</button></div>
  `;

function refreshProgressView(){
  const statXp = document.getElementById('statXp'); if(statXp) statXp.textContent = state.xp;
  const statLevel = document.getElementById('statLevel'); if(statLevel) statLevel.textContent = levelFromXp(state.xp);
  const statHangulBest = document.getElementById('statHangulBest'); if(statHangulBest) statHangulBest.textContent = state.quiz.hangul.best+'/10';
  const statVocabBest = document.getElementById('statVocabBest'); if(statVocabBest) statVocabBest.textContent = state.quiz.vocab.best+'/10';
  const checklistWrap = document.getElementById('checklistWrap'); if(checklistWrap) checklistWrap.innerHTML = checklistHTML();
}
function refreshHomeSnippet(){
  document.querySelectorAll('.path-step').forEach(el=>{
    el.classList.toggle('done', !!state.visited[el.dataset.goto]);
  });
}
function updateXpPill(){
  const el = document.getElementById('xpVal');
  if(el) el.textContent = state.xp;
}
function confirmReset(){
  const btn = document.getElementById('resetProgressBtn');
  if(btn.dataset.confirming){
    state = defaultState();
    saveState();
    updateXpPill();
    refreshProgressView();
    refreshHomeSnippet();
    btn.dataset.confirming = '';
    btn.textContent = 'إعادة تعيين كل التقدّم';
  }else{
    btn.dataset.confirming = '1';
    btn.textContent = 'اضغطي مرة أخرى للتأكيد';
    setTimeout(()=>{ if(btn.dataset.confirming){ btn.dataset.confirming=''; btn.textContent='إعادة تعيين كل التقدّم'; } }, 4000);
  }
}

/* ============ VIEW SWITCHING ============ */
function switchView(view){
  currentView = view;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const target = document.getElementById('view-'+view);
  if(target) target.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  window.scrollTo({top:0, behavior:'smooth'});
  if(['hangul','vocab','grammar','phrases'].includes(view) && !state.visited[view]){
    state.visited[view] = true;
    saveState();
    refreshProgressView();
    refreshHomeSnippet();
  }
}

document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab-btn');
  if(btn) switchView(btn.dataset.view);
});

document.getElementById('mainViews').addEventListener('click', e=>{
  const listenBtn = e.target.closest('.listen-btn');
  if(listenBtn){ speak(listenBtn.dataset.speak); return; }

  const gotoEl = e.target.closest('[data-goto]');
  if(gotoEl){ switchView(gotoEl.dataset.goto); return; }

  const modeCard = e.target.closest('.quiz-mode-card');
  if(modeCard){ startQuiz(modeCard.dataset.mode); return; }

  const opt = e.target.closest('.quiz-opt');
  if(opt && !opt.disabled){ answerQuiz(opt); return; }

  if(e.target.closest('#quizNextBtn')){ nextQuizQuestion(); return; }
  if(e.target.closest('#quizRetryBtn')){ startQuiz(quizState.mode); return; }
  if(e.target.closest('#quizBackBtn')){ document.getElementById('quizArea').innerHTML=''; quizState=null; return; }
  if(e.target.closest('#resetProgressBtn')){ confirmReset(); return; }
});

async function init(){
  await loadState();
  buildAllViews();
  updateXpPill();
}
init();
</script>
</body>
</html>
