<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글이랑 · تعلّم الكورية</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --bg: #F5EFE1; --navy: #1D2951; }
  body { background-color: var(--bg); font-family: 'Cairo', sans-serif; }
  .hidden { display: none; }
</style>
</head>
<body class="p-0 m-0">

  <!-- شاشة تسجيل الدخول -->
  <div id="login-container" class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm">
      <h1 class="text-2xl font-bold mb-2 text-center text-[#1D2951]">한글이랑</h1>
      <p class="text-sm text-gray-600 mb-6 text-center">ادخلي اسمك لإنشاء ملفك التعليمي ومتابعة تقدمك بين المشاركين</p>
      <input type="text" id="username" placeholder="اسم المستخدم" class="w-full p-3 border rounded-xl mb-3">
      <input type="password" id="password" placeholder="رمز الدخول" class="w-full p-3 border rounded-xl mb-4">
      <button onclick="login()" class="w-full bg-[#1D2951] text-white py-3 rounded-xl font-bold">تسجيل الدخول</button>
    </div>
  </div>

  <!-- المنصة التعليمية (تظهر بعد الدخول) -->
  <div id="main-platform" class="hidden min-h-screen p-6">
    <header class="flex justify-between items-center mb-8">
      <h2 class="text-2xl font-black text-[#1D2951]">أهلاً بك في المنصة</h2>
      <button onclick="logout()" class="text-red-500 text-sm">تسجيل خروج</button>
    </header>
    
    <div id="content" class="space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h3 class="font-bold text-lg mb-2">درس اليوم المتجدد</h3>
        <p id="lesson-text" class="text-gray-700">تحميل محتوى تعليمي محدث...</p>
      </div>
    </div>
  </div>

<script>
  let users = [ { name: "ورد", role: "admin", status: "active" }, { name: "طالب1", status: "active" } ];

  function login() {
    const name = document.getElementById('username').value;
    const user = users.find(u => u.name === name);

    if (name === "ورد") {
      enterPlatform();
      // هنا تضاف منطق لوحة تحكم ورد
    } else if (user && user.status === 'active') {
      enterPlatform();
      updateContent();
    } else {
      alert("يرجى الانتظار حتى تقوم ورد بالموافقة على حسابك.");
    }
  }

  function enterPlatform() {
    document.getElementById('login-container').classList.add('hidden');
    document.getElementById('main-platform').classList.remove('hidden');
  }

  function updateContent() {
    const lessons = ["تعلم الحروف الساكنة", "قواعد النطق الكوري", "تكوين الجمل البسيطة"];
    const randomLesson = lessons[Math.floor(Math.random() * lessons.length)];
    document.getElementById('lesson-text').innerText = randomLesson;
  }

  function logout() {
    location.reload();
  }
</script>
</body>
</html>
